# Full containerized stack: Postgres + migrations + the Next.js app.
# Usage: docker compose -f docker-compose.app.yml up --build
# Set a strong JWT_SECRET in the environment for production.
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: minisass
      POSTGRES_PASSWORD: minisass
      POSTGRES_DB: minisass
    volumes:
      - app-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U minisass -d minisass"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    build:
      context: .
      target: migrator
    restart: "no"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://minisass:minisass@db:5432/minisass?schema=public"
      RUN_SEED: "true"

  app:
    build:
      context: .
      target: runner
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: "postgresql://minisass:minisass@db:5432/minisass?schema=public"
      JWT_SECRET: "${JWT_SECRET:-change-me-to-a-long-random-string-min-32}"
    ports:
      - "3000:3000"

volumes:
  app-db-data:
